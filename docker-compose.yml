# EC2에서 앱 컨테이너를 기동하는 구성.
# 실제 값(이미지 태그, DB 접속정보)은 같은 폴더의 .env 를 CD 워크플로우가 생성해 주입한다.
services:
  app:
    image: ${DOCKER_IMAGE}          # 예: <dockerhub-id>/plog-be:latest  (.env 에서 주입)
    container_name: plog-be
    ports:
      # 외부 트래픽은 호스트 nginx(443)만 받고, 앱은 nginx를 통해서만 접근 → 127.0.0.1 바인딩으로 8080 직접노출 차단
      - "127.0.0.1:8080:8080"
    env_file:
      - .env                        # DB_* / JWT_SECRET / MAIL_* 주입
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # 저장·연산은 UTC 기준(TimeUtil). 컨테이너 기본값에 기대지 않고 명시해 로그도 DB와 같은 기준으로 남긴다.
      TZ: UTC
    restart: unless-stopped
