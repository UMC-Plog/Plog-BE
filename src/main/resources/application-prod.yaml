spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      # 스키마가 안정되면 Flyway 도입 후 validate 로 전환 권장 (지금은 개발 편의상 update)
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
