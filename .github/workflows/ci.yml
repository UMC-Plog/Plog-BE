name: CI

# dev / main 으로의 PR 시 테스트 + 빌드 검증만 수행 (배포 X)
on:
  pull_request:
    branches: [dev, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: JDK 21 설정
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: gradlew 실행 권한
        run: chmod +x gradlew

      - name: 빌드 & 테스트
        run: ./gradlew clean build
